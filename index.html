<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Expense & Budget Visualizer - Kelola Pengeluaran Harian Anda" />
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💸</text></svg>" />

  <!-- ===== Chart.js CDN (required for pie chart) ===== -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <noscript>
    <p style="text-align:center;padding:1rem;background:#fee;color:#900;">
      JavaScript is required to use this app.
    </p>
  </noscript>

  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="header-inner">
      <h1 class="app-title">💸 Budget Visualizer</h1>

      <!-- Dark / Light Mode Toggle (Optional Challenge) -->
      <button id="themeToggle" class="btn-icon" aria-label="Toggle dark mode" title="Toggle dark/light mode">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <main class="app-main">

    <!-- ===== TOTAL BALANCE ===== -->
    <section class="card balance-card" aria-label="Balance summary">
      <p class="balance-label">Total Balance</p>
      <p class="balance-amount" id="totalBalance">Rp 0</p>

      <!-- Warning banner — hidden by default, shown when limit is exceeded -->
      <div class="warning-banner" id="warningBanner" role="alert" aria-live="polite" hidden>
        ⚠️ Expense exceeds the budget limit!
      </div>

      <!-- Budget Limit Input (Optional Challenge) -->
      <div class="budget-limit-row">
        <label for="budgetLimit" class="budget-limit-label">Budget Limit (Rp):</label>
        <input
          type="number"
          id="budgetLimit"
          class="input budget-limit-input"
          placeholder="e.g: 500000"
          min="0"
          aria-label="Budget limit amount"
        />
      </div>
    </section>

    <!-- ===== PIE CHART ===== -->
    <section class="card chart-card" aria-label="Spending graph per category">
      <h2 class="section-title">Expense per Category</h2>
      <div class="chart-wrapper">
        <canvas id="expenseChart" role="img" aria-label="Expense pie chart"></canvas>
      </div>
      <p class="chart-empty" id="chartEmpty">No data displayed yet</p>
    </section>

    <!-- ===== INPUT FORM ===== -->
    <section class="card form-card" aria-label="Add transaction">
      <h2 class="section-title">Add Transaction</h2>

      <form id="transactionForm" novalidate>

        <!-- Item Name -->
        <div class="form-group">
          <label for="itemName" class="form-label">
            Item Name <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            type="text"
            id="itemName"
            class="input"
            placeholder="e.g: Trading Card"
            maxlength="80"
            required
            aria-required="true"
          />
          <span class="field-error" id="itemNameError" role="alert"></span>
        </div>

        <!-- Amount -->
        <div class="form-group">
          <label for="itemAmount" class="form-label">
            Amount (Rp) <span class="required" aria-hidden="true">*</span>
          </label>
          <input
            type="number"
            id="itemAmount"
            class="input"
            placeholder="e.g: 34000"
            min="1"
            required
            aria-required="true"
          />
          <span class="field-error" id="itemAmountError" role="alert"></span>
        </div>

        <!-- Category -->
        <div class="form-group">
          <label for="itemCategory" class="form-label">
            Category <span class="required" aria-hidden="true">*</span>
          </label>
          <div class="select-wrapper">
            <select id="itemCategory" class="input select" required aria-required="true">
              <option value="" disabled selected>Select a category</option>
              <!-- Default + custom categories rendered by JS -->
            </select>
          </div>
          <span class="field-error" id="itemCategoryError" role="alert"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full">+ Add Transaction</button>
      </form>

      <!-- ===== ADD NEW CATEGORY (Optional Challenge) ===== -->
      <div class="add-category-section">
        <h3 class="subsection-title">Add New Category</h3>
        <div class="add-category-row">
          <input
            type="text"
            id="newCategoryInput"
            class="input"
            placeholder="New category name"
            maxlength="40"
            aria-label="New category name"
          />
          <button id="addCategoryBtn" class="btn btn-secondary">Add</button>
        </div>
        <span class="field-error" id="categoryError" role="alert"></span>
      </div>
    </section>

    <!-- ===== TRANSACTION LIST ===== -->
    <section class="card list-card" aria-label="Transaction list">
      <div class="list-header">
        <h2 class="section-title">Transaction List</h2>
        <button id="clearAllBtn" class="btn btn-danger btn-sm" aria-label="Delete all transactions">
          Delete All
        </button>
      </div>

      <!-- ===== Scrollable list — items rendered by JS ===== -->
      <ul
        id="transactionList"
        class="transaction-list"
        aria-live="polite"
        aria-label="Transaction items"
      ></ul>

      <p class="list-empty" id="listEmpty">No transactions yet. Add one above!</p>
    </section>

  </main>

  <footer class="app-footer">
    <p>Expense &amp; Budget Visualizer &copy; 2026</p>
  </footer>

  <!-- ===== MAIN SCRIPT (will move to js/ folder later) ===== -->
  <script src="js/script.js" defer></script>

</body>
</html>
